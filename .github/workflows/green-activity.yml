name: Keep GitHub Activity Green

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily (10:00 AM PHT)
    - cron: '0 8 * * *'   # 08:00 UTC daily (04:00 PM PHT)
    - cron: '0 15 * * *'  # 15:00 UTC daily (11:00 PM PHT)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  green-activity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Randomize run time
        env:
          JITTER_MAX_SECONDS: 1800
        run: |
          JITTER=$(( RANDOM % JITTER_MAX_SECONDS ))
          echo "Sleeping for $JITTER seconds to randomize commit time..."
          sleep "$JITTER"

      - name: Make activity updates with multiple commits
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

          # Randomly choose 1-3 commits
          NUM_COMMITS=$(( (RANDOM % 3) + 1 ))
          echo "Creating $NUM_COMMITS commit(s) for this run..."

          # Array of varied commit messages
          MESSAGES=(
            "chore: update activity logs"
            "chore: automated maintenance"
            "chore: daily sync"
            "chore: activity tracking update"
            "chore: keep repository active"
          )

          # Make NUM_COMMITS commits
          for i in $(seq 1 $NUM_COMMITS); do
            # Run the update script to add timestamp
            bash scripts/update-activity.sh

            # Add a small delay between commits for realistic timestamps
            if [ $i -lt $NUM_COMMITS ]; then
              sleep $(( (RANDOM % 60) + 30 ))
            fi

            # Commit the change
            RANDOM_MSG="${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}"
            git add -A
            git commit -m "$RANDOM_MSG"
            echo "Commit $i/$NUM_COMMITS completed"
          done

          # Push all commits at once
          git push
          echo "All $NUM_COMMITS commit(s) pushed successfully"
